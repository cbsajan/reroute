name: Deploy Documentation

on:
  # Trigger on any push to main branch
  push:
    branches:
      - main
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reroute repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true
          cache-dependency-path: docs/pyproject.toml

      - name: Install dependencies
        working-directory: ./docs
        run: |
          uv pip install --system mkdocs mkdocs-material

      - name: Deploy to GitHub Pages
        working-directory: ./docs
        run: |
          mkdocs gh-deploy --force